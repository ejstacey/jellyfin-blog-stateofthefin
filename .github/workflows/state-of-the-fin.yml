name: State of the Fin

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python StateOfFin.py

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(python -c "from datetime import date; print(date.today().replace(day=1).isoformat())")
          BRANCH="state-of-the-fin/${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add blog/ archive/ current/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "State of the Fin ${DATE}"
          git push origin --delete "${BRANCH}" 2>/dev/null || true
          git push -u origin "${BRANCH}"
          gh label create "state-of-the-fin" --color "6f42c1" --description "Monthly State of the Fin report" 2>/dev/null || true
          EXISTING=$(gh pr list --head "${BRANCH}" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for ${BRANCH}"
          else
            gh pr create \
              --title "State of the Fin ${DATE}" \
              --body "Auto-generated State of the Fin report for review." \
              --label "state-of-the-fin"
          fi
